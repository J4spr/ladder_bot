services:
    # 1. PostgreSQL Database Service
    db:
        image: postgres:16-alpine
        container_name: fom_postgres
        restart: always
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: Multiwan
            POSTGRES_DB: fom
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

    # 2. Your Discord Bot Service
    bot:
        build: .
        container_name: fom_discord_bot
        restart: always
        depends_on:
            - db
        environment:
            - DB_HOST=db
            - DB_USER=postgres
            - DB_PASSWORD=Multiwan
            - DB_NAME=fom
            - DB_PORT=5432

volumes:
    postgres_data:
